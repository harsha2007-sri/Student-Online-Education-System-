<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h2>Faculty Dashboard</h2>
            <div class="nav-user">
                <span id="user-name"></span>
                <button class="btn btn-secondary" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="dashboard-header">
            <h1>My Exams</h1>
            <button class="btn btn-primary" onclick="showCreateExamModal()">Create New Exam</button>
        </div>

        <div id="exams-list" class="exams-grid"></div>
    </div>

    <!-- Create Exam Modal -->
    <div id="create-exam-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('create-exam-modal')">&times;</span>
            <h2>Create New Exam</h2>
            <form id="create-exam-form">
                <div class="form-group">
                    <label>Exam Title</label>
                    <input type="text" id="exam-title" required>
                </div>
                <div class="form-group">
                    <label>Duration (minutes)</label>
                    <input type="number" id="exam-duration" min="1" required>
                </div>
                <div class="form-group">
                    <label>Start Time</label>
                    <input type="datetime-local" id="exam-start-time" required>
                </div>
                <div class="form-group">
                    <label>End Time</label>
                    <input type="datetime-local" id="exam-end-time" required>
                </div>
                <button type="submit" class="btn btn-primary">Create Exam</button>
            </form>
        </div>
    </div>

    <!-- Add Questions Modal -->
    <div id="add-questions-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('add-questions-modal')">&times;</span>
            <h2>Add Questions</h2>
            <div id="questions-container"></div>
            <button class="btn btn-secondary" onclick="addQuestionForm()">Add Question</button>
            <button class="btn btn-primary" onclick="saveAllQuestions()">Save All Questions</button>
        </div>
    </div>

    <!-- Exam Report Modal -->
    <div id="exam-report-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('exam-report-modal')">&times;</span>
            <h2>Exam Report</h2>
            <div id="report-content"></div>
        </div>
    </div>

    <div id="message" class="message"></div>
    <script src="js/faculty.js"></script>
</body>
</html>
